{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card mt-5">
      <div class="card-body">
        <h4 class="card-title mb-3 text-center">DTPCSSO</h4>
        <p class="text-muted text-center">Connexion</p>
        <form method="post">
          {% csrf_token %}
          {% if form.errors %}
            <div class="alert alert-danger">Identifiant ou mot de passe incorrect.</div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label">Identifiant</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
